server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text assets on the way out.
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;

    # Vite fingerprints filenames in /assets, so they can be cached forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Single-page-app fallback: any unknown path serves index.html
    # so client-side routing / anchors keep working.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
